<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en">
<head>
	<meta http-equiv="content-type" content="text/html; charset=UTF-8" />
	<title>{TITLE}</title>
	<style type="text/css">
	@import url(https://fonts.googleapis.com/css?family=Open+Sans);
		body {
			font-family: arial, helvetica, verdana, sans-serif;
			font-family: 'Open Sans', sans-serif;
			font-size: 10px;
			color: #494949;
		}
		table {			   
		   border-collapse: collapse;
		   width: 100%;		
		   margin-top: 10px;
		}
		th, td {
			/* border: .1em solid #CCC; */   
			padding: 2px;
			text-align:center;
			font-size: 12px;
			background: #f7f7f7;
		}
		.table_title {
			text-align: left;
		}
		th.table_title {
			font-style: italic;
			border: none;
		}
		p {
			padding: 3px;
			padding-left: 25px;
			/* border: .1em solid #CCC; */				
			font-size: 12px;
			margin: 0;
			margin-top: 5px;	
			background: #f7f7f7;			
		}
		p.inline {
			border: none;
			padding: 0;
			padding-left: 25px;
		}
		h1, h2, h3, h4, h5 {
			margin: 0;
			padding: 0;
		}
		h1 {
			margin-top: 25px;
			font-size: 16px;			
		}
		h2 {
			margin-top: 18px;
			font-size: 14px;
		}
		h3 {
			margin-top: 14px;
			font-size: 12px;
		}
		h4 {
			margin-top: 10px;
			font-size: 12px;
		}
		.trainer {
			float: right;
			font-size: 18px;
			font-weight: bold;
			margin: 15px;
		}

		table, tr, td, th, tbody, thead, tfoot {
			page-break-inside: avoid !important;
		}
	</style>
</head>
<body>
	<img alt="Logo" src="{LOGO_URL}" />
	<!-- <div class="trainer">{TRAINER_NAME}</div> -->
	<br clear="all" />
	{CONTENT}
</body>
</html>
